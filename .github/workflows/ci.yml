name: ci

# The certification chain as CI (Tier-3 ⑧). Browser unit suite + typecheck +
# build + service pytest + audits run on every push; the full corpus gate
# runs on Modal (burst) and is NOT duplicated here — baselines in
# bench/baselines/ are the committed evidence.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bunx vitest run
      - run: bunx vite build
      - name: npm audit (prod)
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --omit=dev

  service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install service deps
        run: pip install -r service/requirements.txt pytest pip-audit
      - name: pytest (corpus/model tests skip honestly on fresh checkouts —
              full certification lives on the Modal burst)
        run: cd service && python -m pytest tests/ -q
      - name: pip-audit
        run: pip-audit -r service/requirements.txt
