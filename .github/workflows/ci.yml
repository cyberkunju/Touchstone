name: ci

# The certification chain as CI (Tier-3 ⑧). Browser unit suite + typecheck +
# build + service pytest + audits run on every push; the full corpus gate
# runs on Modal (burst) and is NOT duplicated here — baselines in
# bench/baselines/ are the committed evidence.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bunx vitest run
      - run: bunx vite build
      - name: npm audit (prod)
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --omit=dev

  # OS smoke matrix (Tier-3): the pure-logic core must build + pass the unit
  # suite identically on Linux, macOS and Windows. The corpus gate stays on
  # the Modal burst (single reference environment); this proves the ENGINE
  # is OS-agnostic — no path-separator, line-ending, or Intl locale surprise
  # (the U+3000 dict trap and PS UTF-16 redirect traps were exactly this
  # class of bug caught late). Fast: no browser download, no corpus.
  os-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bunx vitest run

  service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install service deps
        run: pip install -r service/requirements.txt pytest pip-audit
      - name: pytest (corpus/model tests skip honestly on fresh checkouts —
              full certification lives on the Modal burst)
        run: cd service && python -m pytest tests/ -q
      - name: pip-audit
        run: pip-audit -r service/requirements.txt

  # Service OS smoke (Tier-3): the native-runtime service must import and
  # pass its OS-agnostic unit tests on macOS + Windows too. Corpus/model
  # tests skip honestly on fresh checkouts (conftest.py), so this asserts
  # the pure logic (bundle contract, router, difflib parity, envelope) is
  # portable — the service ships as a wheel to all three OSes.
  service-os-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install service deps
        run: pip install -r service/requirements.txt pytest
      - name: pytest (corpus/model tests skip on fresh checkouts)
        run: cd service && python -m pytest tests/ -q
