    <!-- P7.3 §2.3 CSP: zero third-party origins. 'wasm-unsafe-eval' is
         onnxruntime-web's requirement; blob: workers/imgs are Vite worker
         bundles and object-URL page rasters; style 'unsafe-inline' covers
         React style attributes; connect-src allows ONLY the loopback
         perception service (and same-origin, incl. dev HMR ws). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' http://127.0.0.1:8477; object-src 'none'; base-uri 'self'; form-action 'self'" />

  </head>
